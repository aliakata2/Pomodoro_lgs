<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sessizlik Oyunu</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green:#1D9E75; --green-light:#E1F5EE; --green-dark:#0F6E56;
  --red:#E24B4A; --red-light:#FCEBEB; --red-dark:#A32D2D;
  --amber:#EF9F27; --amber-light:#FAEEDA; --amber-dark:#BA7517;
  --blue:#2176AE; --blue-light:#E6F1FB;
  --bg:#F7F7F5; --card:#FFFFFF; --border:rgba(0,0,0,0.08);
  --text:#1a1a1a; --muted:#888; --radius:16px;
}
body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.wrap { max-width:480px; margin:0 auto; padding:16px; }

/* ŞUBE GİRİŞ EKRANI */
.screen { display:none; }
.screen.active { display:block; }
.start-screen { text-align:center; padding:40px 16px; }
.start-screen .logo { font-size:52px; margin-bottom:12px; }
.start-screen h1 { font-size:22px; font-weight:800; margin-bottom:4px; }
.start-screen p { font-size:13px; color:var(--muted); margin-bottom:32px; }
.sube-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px; box-shadow:0 1px 4px rgba(0,0,0,0.05); text-align:left; }
.sube-card label { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:8px; }
.sube-input-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.sinif-sel { flex:1; min-width:80px; padding:10px 12px; border-radius:10px; border:1.5px solid var(--border); font-family:'Nunito',sans-serif; font-size:15px; font-weight:700; background:var(--bg); color:var(--text); appearance:none; -webkit-appearance:none; }
.sinif-sel:focus { outline:none; border-color:var(--green); }
.sube-btns { display:flex; gap:6px; flex-wrap:wrap; }
.sube-btn { padding:8px 16px; border-radius:10px; border:1.5px solid var(--border); background:var(--bg); font-family:'Nunito',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.15s; color:var(--text); }
.sube-btn.sel { background:var(--green); color:#fff; border-color:var(--green); }
.sube-btn:active { transform:scale(0.96); }
.btn-basla { width:100%; padding:16px; border-radius:14px; border:none; background:var(--green); color:#fff; font-family:'Nunito',sans-serif; font-size:16px; font-weight:800; cursor:pointer; transition:all 0.15s; margin-top:8px; }
.btn-basla:disabled { background:#ccc; color:#999; }
.btn-basla:active { transform:scale(0.98); }
.secim-label { font-size:15px; font-weight:800; color:var(--green); margin-top:12px; min-height:24px; text-align:center; }

/* ÖLÇÜM EKRANI */
.header { display:flex; align-items:center; gap:10px; padding:8px 0 14px; }
.header-back { background:none; border:none; font-size:20px; cursor:pointer; padding:4px 8px; border-radius:8px; }
.header-back:active { background:var(--border); }
.header-title { font-size:16px; font-weight:800; }
.header-sube { font-size:13px; font-weight:700; color:var(--green); background:var(--green-light); padding:3px 10px; border-radius:20px; margin-left:auto; }
.mic-err { background:var(--red-light); color:var(--red-dark); border-radius:10px; padding:10px 14px; font-size:13px; margin-bottom:12px; display:none; }
.top-row { display:flex; gap:10px; margin-bottom:12px; }
.meter-box { flex:0 0 130px; background:var(--card); border-radius:var(--radius); border:1px solid var(--border); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16px 8px; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
.db-big { font-size:54px; font-weight:800; line-height:1; color:var(--text); transition:color 0.2s; }
.db-unit { font-size:12px; color:var(--muted); margin-top:2px; }
.status-pill { margin-top:8px; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; background:var(--bg); color:var(--muted); transition:all 0.2s; }
.info-grid { flex:1; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.info-card { background:var(--card); border-radius:12px; border:1px solid var(--border); padding:10px 12px; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
.info-card .lbl { font-size:10px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px; }
.info-card .val { font-size:20px; font-weight:800; color:var(--text); }
